services:
  nauassist:
    build: .
    image: ghcr.io/benediktnau/nauassist:latest
    ports:
      - "8080:8080"
    volumes:
      - nauassist-data:/app/data
    environment:
      - Time__Zone=Europe/Berlin
      # WhatsApp ist opt-in. Standard: aus → kein Feature, keine Endpoints, keine UI-Section.
      - AutonomousAgent__WhatsApp__Enabled=${WHATSAPP_ENABLED:-false}
      - AutonomousAgent__WhatsApp__SidecarBaseUrl=http://nauassist-wa:3000
      - AutonomousAgent__WhatsApp__SharedSecret=${WHATSAPP_SHARED_SECRET:-}
      # Keycloak-Auth ist opt-in (BFF). Standard: aus → Single-User wie bisher.
      - Auth__Enabled=${AUTH_ENABLED:-false}
      - Auth__Authority=${AUTH_AUTHORITY:-http://localhost:8081}
      - Auth__Realm=${AUTH_REALM:-nauassist}
      - Auth__ClientId=${AUTH_CLIENT_ID:-nauassist-web}
      - Auth__ClientSecret=${AUTH_CLIENT_SECRET:-nauassist-dev-secret}
      # Backchannel übers Compose-Netz (kein TLS-Hairpin durch den Coolify-Proxy).
      - Auth__InternalUrl=${AUTH_INTERNAL_URL:-http://keycloak:8080}
      - Auth__RequireHttpsMetadata=${AUTH_REQUIRE_HTTPS_METADATA:-false}
    restart: unless-stopped

  # Startet NUR mit aktivem Compose-Profil "whatsapp" (siehe .env / COMPOSE_PROFILES).
  nauassist-wa:
    build: ./src/sidecar
    image: ghcr.io/benediktnau/nauassist-wa:latest
    profiles: ["whatsapp"]
    volumes:
      - nauassist-wa:/data
    environment:
      - SIDECAR_TOKEN=${WHATSAPP_SHARED_SECRET:-}
      - PORT=3000
    expose:
      - "3000" # nur internes Compose-Netz, kein Host-Port
    restart: unless-stopped

  # Startet NUR mit aktivem Compose-Profil "auth" (siehe .env / COMPOSE_PROFILES).
  # Lokal/personal: start-dev mit H2-Datei im Volume; Postgres-Hardening = Later.
  # Coolify: dem Service eine eigene (Sub-)Domain zuweisen → KC_HOSTNAME setzen,
  # TLS terminiert am Proxy (KC_PROXY_HEADERS/KC_HTTP_ENABLED).
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    profiles: ["auth"]
    command: start-dev --import-realm
    ports:
      - "8081:8080" # Browser muss Keycloak direkt erreichen (Login-Redirect)
    volumes:
      # Keep the bind mount for the realm import (with :z for SELinux)
      - ./keycloak/realm-nauassist.json:/opt/keycloak/data/import/realm-nauassist.json:ro,z

    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME=${KC_HOSTNAME:-http://localhost:8081}
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      # Platzhalter im Realm-Import (keycloak/realm-nauassist.json):
      - NAUASSIST_OIDC_SECRET=${AUTH_CLIENT_SECRET:-nauassist-dev-secret}
      - NAUASSIST_PUBLIC_URL=${AUTH_PUBLIC_URL:-http://localhost:8080}
      - NAUASSIST_TEST_USER=${NAUASSIST_TEST_USER:-test}
      - NAUASSIST_TEST_PASSWORD=${NAUASSIST_TEST_PASSWORD:-test}
    restart: unless-stopped

volumes:
  nauassist-data:
  nauassist-wa:
  keycloak-data:
